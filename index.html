<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bookmark Landing Page</title>
    <link rel="stylesheet" href="dist/main.css">
    <link rel="icon" sizes="32x32" type="image/png" href="images/favicon-32x32.png">
    <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        
    </div>
    <header class="flex overflow-hidden py-7 px-28 shadow-md w-full items-center justify-between">
        <img src="images/logo-bookmark.svg" alt="logo-image">
        <nav class="flex items-center uppercase">
            <ul>
                <li class="mx-3 block float-left">
                    <a href="#features" class="p-3 hover:text-softRed active:text-softRed">features</a>
                </li>
                <li class="mx-3 block float-left">
                    <a href="#pricing" class="p-3 hover:text-softRed active:text-softRed">pricing</a>
                </li>
                <li class="mx-3 block float-left">
                    <a href="#contact" class="p-3 hover:text-softRed active:text-softRed">contact</a>
                </li>
            </ul>
            <button type="button" class="uppercase ml-5 rounded-md shadow-lg bg-softRed px-10 py-2 text-white font-medium hover:bg-white hover:text-softRed hover:border-2 hover:border-softRed">login</button>
        </nav>
    </header>

    <div class="px-28 py-20 w-full flex items-center justify-between ">
        <div class="left">
            <h1 class="text-darkBlue text-5xl mb-8 font-medium">A Simple Bookmark <br> Manager</h1>
            <p class="text-lg text-grayishBlue mb-8">
                A clean and simple interface to organize your favorite <br>
                websites. Open a new browser tab and see your sites load <br>
                instantly. try it for free.
            </p>
            <div class="flex">
                <button type="button" class="bg-softBlue rounded-md py-3 text-white px-8 font-medium text-sm shadow-md">Get it on Chrome</button>
            </div>
        </div>
        <div class="right">
            <img src="images/illustration-hero.svg" alt="">
        </div>
    </div>
    
    <script src="dist/index.js"></script>
</body>
</html>
